name: CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  validate-services:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Build Docker images
        run: |
          docker build -t expense-service:ci ./expense-service
          docker build -t summary-service:ci ./summary-service

      - name: Run service smoke tests
        run: |
          set -euo pipefail

          cleanup() {
            echo "--- expense-service logs ---"
            docker logs expense-service || true
            echo "--- summary-service logs ---"
            docker logs summary-service || true
          }

          trap cleanup ERR

          wait_for_url() {
            local url="$1"
            local retries=30
            local delay=2

            for ((i=1; i<=retries; i++)); do
              if curl -fsS "$url" >/dev/null; then
                echo "Ready: $url"
                return 0
              fi
              sleep "$delay"
            done

            echo "Timed out waiting for $url"
            return 1
          }

          docker network create expense-net

          docker run -d --rm \
            --name expense-service \
            --network expense-net \
            -p 8000:8080 \
            expense-service:ci

          docker run -d --rm \
            --name summary-service \
            --network expense-net \
            -e EXPENSE_SERVICE_URL=http://expense-service:8080 \
            -p 8001:8080 \
            summary-service:ci

          wait_for_url http://127.0.0.1:8000/expenses
          wait_for_url http://127.0.0.1:8001/summary

          curl -fsS http://127.0.0.1:8000/expenses
          curl -fsS http://127.0.0.1:8001/summary
